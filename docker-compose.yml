version: '3.9'

services:
  # Бдшка
  postgres:
    image: postgres:17
    container_name: postgres_lab3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab3_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql_scripts:/docker-entrypoint-initdb.d
    networks:
      - lab3_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_lab3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_lab3:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka_lab3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "ciWo7G1KTE2r_jGE32xS-g"
    networks:
      - lab3_network

  # JobManager - распределяет задачи
  jobmanager:
    build: ./flink_job
    container_name: flink_jobmanager
    ports:
      - "8081:8081" # Web UI интерфейс Flink
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    networks:
      - lab3_network

  # TaskManager - выполняет код
  taskmanager:
    build: ./flink_job
    container_name: flink_taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2 # Может выполнять 2 задачи параллельно
    networks:
      - lab3_network

  # Генератор данных
  data_producer:
    build: ./producer
    container_name: kafka_producer
    depends_on:
      - kafka
    volumes:
      - ./data:/data
    networks:
      - lab3_network

networks:
  lab3_network:
    driver: bridge

volumes:
  postgres_data: